<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A! Chatbot</title>
    <meta name="description" content="Next-generation AI chatbot powered by Python and LangChain.">
    <!-- Google fonts link is placed here for typography -->
    <link rel="stylesheet" href="index.css">
    <link rel="icon"
        href="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQ4DMm-lJBYbDM4_uwH-ECsfVxCue0-yK-CNo-8aYPUQA&s=10">
</head>

<body>
    <!-- Ambient Aurora Background and Floating Orbs -->
    <div class="aurora-container" aria-hidden="true">
        <div class="aurora-mesh"></div>
        <div class="orb orb-cyan"></div>
        <div class="orb orb-purple"></div>
        <div class="orb orb-pink"></div>
        <div class="particles-overlay"></div>
    </div>

    <!-- Centered Glassmorphic Chatbot Container -->
    <main class="chatbot-container" id="chatbot">

        <!-- Header Section -->
        <header class="chatbot-header">
            <div class="header-left">
                <div class="logo-container">
                    <div class="logo-glow"></div>
                    <div class="logo-orb">
                        <!-- Futuristic AI Orb SVG -->
                        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" stroke="#ffffff"
                                stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none" />
                        </svg>
                    </div>
                </div>
                <div class="ai-meta">
                    <h1 class="ai-name">ChatBot <span class="version-badge">v1.0</span></h1>
                    <span class="ai-engine">Powered By Gemini</span>
                </div>
            </div>
            <div class="header-right">
                <div class="status-badge">
                    <span class="status-dot"></span>
                    <span class="status-text">ONLINE</span>
                </div>
            </div>
        </header>

        <!-- Message History Section -->
        <section class="chatbot-messages" aria-label="Chat messages history" id="chatbox">

            <!-- AI Welcome Message -->
            <div class="message-wrapper ai">
                <div class="message-avatar" aria-hidden="true">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <rect x="3" y="11" width="18" height="10" rx="2" stroke="currentColor" stroke-width="1.5"
                            fill="none" />
                        <circle cx="8" cy="16" r="1.5" fill="currentColor" />
                        <circle cx="16" cy="16" r="1.5" fill="currentColor" />
                        <path d="M9 6v5M15 6v5M12 2v4" stroke="currentColor" stroke-width="1.5"
                            stroke-linecap="round" />
                        <circle cx="12" cy="2" r="1" fill="currentColor" />
                    </svg>
                </div>
                <div class="message-bubble">
                    <p id="greet">Welcome Sarthak.</p>
                </div>
            </div>

        </section>

        <!-- Message Input Form Bar -->
        <footer class="chatbot-input-container">
            <div class="input-wrapper">
                <div class="input-inner">
                    <!-- Attachment button -->
                    <!-- <button class="input-action-btn attachment-btn" type="button" aria-label="Attach neural file">
                        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path
                                d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"
                                stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"
                                fill="none" color="white" />
                        </svg>
                    </button> -->
                    <!-- Voice input button -->
                    <button onclick="startRecording()" class="input-action-btn voice-btn" type="button"
                        id="startRecordingButton" aria-label="Initialize voice transcription link">
                        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path d="M12 1a4 4 0 00-4 4v7a4 4 0 008 0V5a4 4 0 00-4-4z" stroke="currentColor"
                                stroke-width="1.5" fill="none" color="white" />
                            <path d="M19 10v1a7 7 0 01-14 0v-1M12 18v5M8 23h8" stroke="currentColor" stroke-width="1.5"
                                stroke-linecap="round" color="white" />
                        </svg>
                    </button>
                    <button onclick="stopRecording()" class="input-action-btn voice-btn" type="button"
                        id="stopRecordingButton" aria-label="Initialize voice transcription link"
                        style="display: none;">
                        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <rect x="6" y="6" width="12" height="12" rx="2" fill="currentColor" color="white" />
                        </svg>
                    </button>
                    <!-- Core input text box -->
                    <input id="msg" type="text" class="message-input" placeholder="Ask Anything To ChatBot..."
                        aria-label="Message prompt input" />
                    <!-- Send Button -->
                    <button class="send-btn" type="button" aria-label="Send message" onclick="sendMessage()">
                        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z" stroke="#ffffff" stroke-width="1.5"
                                stroke-linecap="round" stroke-linejoin="round" />
                        </svg>
                    </button>
                </div>
            </div>
            <div class="footer-hint">ChatBot v1.0 // Created By Sarthak</div>
        </footer>

    </main>
</body>

<script src="index.js"></script>

</html>
